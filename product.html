<!DOCTYPE html>
<html lang="hi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Product Detail</title>

<style>
body{margin:0;font-family:Arial;background:#f5f5f5}

.navbar{display:flex;justify-content:space-between;padding:15px;background:#fff}
.container{max-width:1000px;margin:40px auto;background:#fff;padding:30px;border-radius:12px}

.product{display:flex;gap:30px;align-items:center}
.product img{max-width:300px;width:100%}

.btn{padding:12px 20px;background:#25D366;color:#fff;border-radius:8px;text-decoration:none}

@media(max-width:768px){
.product{flex-direction:column;text-align:center}
}
</style>
</head>

<body>

<div class="navbar">
<b>DEVDIC HERBAL</b>
</div>

<div class="container">
<div class="product">

<img id="productImage">

<div>
<h2 id="productName"></h2>
<div id="productPrice"></div>

<ul id="productBenefits"></ul>

<p><b>Usage:</b> Doctor ki salah ke anusaar</p>

<a class="btn" id="orderBtn" target="_blank">Order Now</a>

</div>

</div>
</div>

<script>

const products = {
"db-boost":{
name:"DB BOOST",
price:"Weight: 60 gm | ₹510",
img:"db-boost.jpg",
benefits:[
"Helps control blood sugar",
"Boosts energy",
"Improves metabolism",
"Herbal formulation"
]
},

"db-life":{
name:"DB LIFE",
price:"Weight: 60 gm | ₹544",
img:"db-life.jpg",
benefits:[
"Controls sugar",
"Boost energy",
"Reduces spikes",
"Daily support"
]
}
};

// 🔥 URL FIX
const params = new URLSearchParams(window.location.search);
const id = params.get("id");

if(!id || !products[id]){
document.body.innerHTML = "<h2 style='text-align:center'>❌ Product not found</h2>";
}else{

const p = products[id];

document.getElementById("productName").innerText = p.name;
document.getElementById("productPrice").innerText = p.price;
document.getElementById("productImage").src = p.img;

let list="";
p.benefits.forEach(b=>{
list += `<li>✔ ${b}</li>`;
});
document.getElementById("productBenefits").innerHTML = list;

document.getElementById("orderBtn").href =
`https://wa.me/918434813523?text=${p.name} order`;

}

</script>

</body>
</html>

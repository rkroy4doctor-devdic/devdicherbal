<!DOCTYPE html>
<html lang="hi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Contact - DEVDIC HERBAL</title>

<style>
body{font-family:Arial;margin:0;background:#f0fdf4}

/* NAVBAR */
.navbar{background:#fff;padding:12px 20px;display:flex;justify-content:space-between;align-items:center;box-shadow:0 2px 10px rgba(0,0,0,.1)}
.nav-links a{text-decoration:none;margin:0 10px;color:#065f46;font-weight:600}

/* HERO */
.hero{background:#065f46;color:#fff;text-align:center;padding:40px}
.hero h1{margin:0}

/* CHAT BUTTON */
.chat-btn{
position:fixed;bottom:20px;right:20px;
background:#25D366;color:#fff;
width:60px;height:60px;
border-radius:50%;
display:flex;align-items:center;justify-content:center;
font-size:28px;cursor:pointer;
box-shadow:0 5px 20px rgba(0,0,0,.3);
}

/* CHAT BOX */
.chat-box{
position:fixed;bottom:90px;right:20px;
width:320px;height:420px;
background:#fff;border-radius:12px;
box-shadow:0 10px 40px rgba(0,0,0,.3);
display:none;flex-direction:column;
overflow:hidden;
}

.chat-header{
background:#065f46;color:#fff;
padding:10px;text-align:center;font-weight:700;
}

.chat-messages{
flex:1;padding:10px;overflow-y:auto;font-size:14px;
}

.msg{margin:6px 0;padding:8px 10px;border-radius:10px;max-width:80%}
.user{background:#dcfce7;margin-left:auto}
.bot{background:#f1f5f9}

.chat-input{
display:flex;border-top:1px solid #ddd
}
.chat-input input{
flex:1;padding:10px;border:none;outline:none
}
.chat-input button{
background:#25D366;color:#fff;border:none;padding:10px 15px;cursor:pointer
}
</style>
</head>

<body>

<!-- NAVBAR -->
<div class="navbar">
<div><b>DEVDIC HERBAL</b></div>
<div class="nav-links">
<a href="index.html">Home</a>
<a href="product.html">Products</a>
<a href="testimonials.html">Testimonials</a>
<a href="about.html">About</a>
<a href="contact.html">Contact</a>
</div>
</div>

<!-- HERO -->
<div class="hero">
<h1>Contact & Support</h1>
<p>Chat karein aur turant solution paayein</p>
</div>

<!-- CHAT BUTTON -->
<div class="chat-btn" onclick="toggleChat()">💬</div>

<!-- CHAT BOX -->
<div class="chat-box" id="chatBox">
<div class="chat-header">DEVDIC AI Assistant</div>

<div class="chat-messages" id="chatMessages"></div>

<div class="chat-input">
<input type="text" id="userInput" placeholder="Apna sawal likhein...">
<button onclick="sendMessage()">Send</button>
</div>
</div>

<script>

let step = 0;
let userName = "";
let selectedProducts = [];
let prices = {
"db boost":510,
"db life":544,
"dabatas":520,
"db pan 10":220
};

function toggleChat(){
let box=document.getElementById("chatBox");
box.style.display = box.style.display==="flex" ? "none":"flex";
box.style.flexDirection="column";
if(step===0){
bot("Namaskar 🙏 pahle aap apna naam batayein");
step=1;
}
}

function bot(text){
let msg=document.createElement("div");
msg.className="msg bot";
msg.innerText=text;
document.getElementById("chatMessages").appendChild(msg);
scrollDown();
}

function user(text){
let msg=document.createElement("div");
msg.className="msg user";
msg.innerText=text;
document.getElementById("chatMessages").appendChild(msg);
scrollDown();
}

function scrollDown(){
let box=document.getElementById("chatMessages");
box.scrollTop=box.scrollHeight;
}

function sendMessage(){
let input=document.getElementById("userInput");
let text=input.value.toLowerCase();
if(!text) return;

user(input.value);
input.value="";

reply(text);
}

function reply(text){

// STEP FLOW

if(step===1){
userName=text;
bot(userName+" ji aapko kitne saal se sugar hai?");
step=2;
return;
}

if(step===2){
bot("Kya aap koi medicine le rahe hain? jaise allopathy ya insulin?");
step=3;
return;
}

if(step===3){
bot("Abhi aapka sugar kitna rehta hai fasting aur random?");
step=4;
return;
}

if(step===4){
bot("Itna high sugar rehna theek nahi hai. Aapko ab proper support ki zarurat hai.");

bot("Aap chahein to hamare junior doctor se free consultation bhi le sakte hain. Wo aapko sahi guidance denge.");

step=5;
return;
}

// DIRECT PRODUCT ORDER

if(text.includes("db boost")){
bot("DB Boost ka price ₹510 hai. Kitne piece chahiye?");
selectedProducts=[];
selectedProducts.push("db boost");
step=10;
return;
}

if(step===10){
let qty=parseInt(text);
if(!isNaN(qty)){
let total=qty*prices[selectedProducts[0]];
bot("Total cost ₹"+total);

bot("Main aapka order WhatsApp par bhej deta hoon");

let msg="Mujhe "+selectedProducts[0]+" x "+qty+" order karna hai";
window.open("https://wa.me/918434813523?text="+encodeURIComponent(msg));

step=0;
return;
}
}

}

</script>

</body>
</html>

<!DOCTYPE html>

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Contact - DEVDIC HERBAL</title>

<style>
body{font-family:Arial;margin:0;background:linear-gradient(to right,#e6f4f1,#f0fdf4)}

.navbar{background:#fff;padding:12px 20px;display:flex;justify-content:space-between;align-items:center}
.nav-links a{margin:0 10px;text-decoration:none;color:#065f46;font-weight:600}

.hero{background:linear-gradient(135deg,#065f46,#10b981);color:#fff;text-align:center;padding:40px}

.contact{display:flex;gap:25px;flex-wrap:wrap;padding:40px;justify-content:center}
.card{background:#fff;padding:25px;border-radius:15px;box-shadow:0 10px 30px rgba(0,0,0,.1);text-align:center;width:260px}
.card a{display:inline-block;margin-top:10px;padding:10px 20px;border-radius:25px;background:#10b981;color:#fff;text-decoration:none}

.map-section{padding:40px;text-align:center}
.map-grid{display:flex;gap:20px;flex-wrap:wrap;justify-content:center}
.map-card{background:#fff;border-radius:15px;box-shadow:0 10px 30px rgba(0,0,0,.1);padding:15px;width:300px}
.map-card iframe{width:100%;height:200px;border-radius:10px}

.chat-btn{position:fixed;bottom:20px;right:20px;background:#25D366;color:#fff;width:60px;height:60px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:28px;cursor:pointer}
.chat-box{position:fixed;bottom:90px;right:20px;width:330px;height:460px;background:#fff;border-radius:15px;box-shadow:0 15px 50px rgba(0,0,0,.3);display:none;flex-direction:column}
.chat-header{background:#065f46;color:#fff;padding:12px;text-align:center}
.chat-messages{flex:1;padding:10px;overflow-y:auto}
.msg{margin:6px 0;padding:10px;border-radius:10px;max-width:80%}
.user{background:#dcfce7;margin-left:auto}
.bot{background:#f1f5f9}
.chat-input{display:flex}
.chat-input input{flex:1;padding:10px;border:none}
.chat-input button{background:#10b981;color:#fff;border:none;padding:10px}
</style>
</head>

<body>

<div class="navbar">
<div><b>DEVDIC HERBAL</b></div>
<div class="nav-links">
<a href="index.html">Home</a>

<a href="about.html">About</a>

</div>
</div>

<div class="hero">
<h1>Contact Us</h1>
</div>

<div class="contact">
<div class="card"><h3>📞 Phone</h3><p>+91 8434813523</p><a href="tel:8434813523">Call Now</a></div>
<div class="card"><h3>💬 WhatsApp</h3><a href="https://wa.me/918434813523">Chat Now</a></div>
<div class="card"><h3>📧 Email</h3><p>devdicherbal@gmail.com</p></div>
</div>

<div class="map-section">
<h2>📍 Our Branch Locations</h2>
<div class="map-grid">
<div class="map-card"><h4>Tajpur</h4><iframe src="https://maps.google.com/maps?q=25.8547,85.6664&z=15&output=embed"></iframe></div>
<div class="map-card"><h4>Bokaro</h4><iframe src="https://maps.google.com/maps?q=23.6659,86.1466&z=15&output=embed"></iframe></div>
<div class="map-card"><h4>Jamshedpur</h4><iframe src="https://maps.google.com/maps?q=22.7995,86.1340&z=15&output=embed"></iframe></div>
<div class="map-card"><h4>Chakradharpur</h4><iframe src="https://maps.google.com/maps?q=22.6698,85.6073&z=15&output=embed"></iframe></div>
</div>
</div>

<div class="chat-btn" onclick="toggleChat()">💬</div>

<div class="chat-box" id="chatBox">
<div class="chat-header">AI Assistant</div>
<div class="chat-messages" id="chatMessages"></div>
<div class="chat-input">
<input id="userInput" placeholder="Type here...">
<button onclick="send()">Send</button>
</div>
</div>

<script>

let products={
"db boost":510,
"db life":544,
"db pan":220,
"dbx sun":450,
"quick qr":110,
"sugar low":510,
"sugar key":540
};

let cart={};
let lastProduct=null;

function toggleChat(){
let box=document.getElementById("chatBox");
box.style.display = box.style.display==="flex"?"none":"flex";
if(chatMessages.innerHTML===""){
bot("Namaste 🙏 aapko kya chahiye ya problem batayein");
}
}

function bot(t){
chatMessages.innerHTML+=`<div class="msg bot">${t}</div>`;
scroll();
}

function user(t){
chatMessages.innerHTML+=`<div class="msg user">${t}</div>`;
scroll();
}

function scroll(){
chatMessages.scrollTop=chatMessages.scrollHeight;
}

function send(){
let input=document.getElementById("userInput");
let text=input.value.toLowerCase();
if(!text)return;
user(input.value);
input.value="";
reply(text);
}

function reply(t){

// PRODUCT
for(let p in products){
if(t.includes(p)){
lastProduct=p;
cart[p]=1;
bot(p.toUpperCase()+" ₹"+products[p]+" ka hai. Kitne piece chahiye?");
return;
}
}

// QUANTITY
let num=parseInt(t);
if(num>0 && lastProduct){
cart[lastProduct]=num;

let total=0;
let msg="Order Summary:\n";

for(let i in cart){
let price=products[i]*cart[i];
total+=price;
msg+=i+" x "+cart[i]+" = ₹"+price+"\n";
}

msg+="Total ₹"+total;

bot(msg);
bot("Order confirm karne ke liye 'order' likhein");
return;
}

// PROBLEM
if(t.includes("sugar")||t.includes("diabetes")){
bot("Aapko kitne saal se sugar hai?");
return;
}

// MEDICINE
if(t.includes("insulin")||t.includes("medicine")){
bot("Abhi aapka sugar kitna rehta hai fasting aur PP?");
return;
}

// HIGH SUGAR
if(t.includes("300")||t.includes("250")){
bot("Itna high sugar dangerous ho sakta hai.");
bot("Aap chahein to main aapki baat hamare junior doctor se karwa sakta hoon.");
return;
}

// DOCTOR
if(t.includes("doctor")){
bot("Free consultation ke liye apna number batayein.");
return;
}

// ORDER FINAL
if(t.includes("order")){
let total=0;
let msg="Order:\n";

for(let i in cart){
let price=products[i]*cart[i];
total+=price;
msg+=i+" x "+cart[i]+" = ₹"+price+"\n";
}

msg+="Total ₹"+total;

window.open("https://wa.me/918434813523?text="+encodeURIComponent(msg));
return;
}

// DEFAULT
bot("Product ka naam ya apni problem batayein");

}

</script>

</body>
</html>

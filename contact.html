<style>
body{font-family:Arial;margin:0;background:linear-gradient(to right,#e6f4f1,#f0fdf4)}

/* NAVBAR */
.navbar{background:#fff;padding:12px 20px;display:flex;justify-content:space-between;align-items:center;box-shadow:0 2px 10px rgba(0,0,0,.1)}
.nav-links a{text-decoration:none;margin:0 10px;color:#065f46;font-weight:600}

/* HERO */
.hero{background:linear-gradient(135deg,#065f46,#10b981);color:#fff;text-align:center;padding:40px}

/* CONTACT */
.contact{display:flex;gap:25px;flex-wrap:wrap;padding:40px;justify-content:center}
.card{background:#fff;padding:25px;border-radius:15px;box-shadow:0 10px 30px rgba(0,0,0,.1);text-align:center;width:260px}
.card a{display:inline-block;margin-top:10px;padding:10px 20px;border-radius:25px;background:#10b981;color:#fff;text-decoration:none}

/* MAP GRID */
.map-section{padding:40px;text-align:center}
.map-grid{display:flex;gap:20px;flex-wrap:wrap;justify-content:center}
.map-card{background:#fff;border-radius:15px;box-shadow:0 10px 30px rgba(0,0,0,.1);padding:15px;width:300px}
.map-card iframe{width:100%;height:200px;border-radius:10px}
.map-card button{margin-top:10px;background:#10b981;color:#fff;border:none;padding:10px 20px;border-radius:20px}

/* CHAT */
.chat-btn{position:fixed;bottom:20px;right:20px;background:#25D366;color:#fff;width:60px;height:60px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:28px;cursor:pointer}
.chat-box{position:fixed;bottom:90px;right:20px;width:330px;height:460px;background:#fff;border-radius:15px;box-shadow:0 15px 50px rgba(0,0,0,.3);display:none;flex-direction:column}
.chat-header{background:#065f46;color:#fff;padding:12px;text-align:center}
.chat-messages{flex:1;padding:10px;overflow-y:auto}
.msg{margin:6px 0;padding:10px;border-radius:10px;max-width:80%}
.user{background:#dcfce7;margin-left:auto}
.bot{background:#f1f5f9}
.chat-input{display:flex}
.chat-input input{flex:1;padding:10px;border:none}
.chat-input button{background:#10b981;color:#fff;border:none;padding:10px}
</style>
</head>

<!-- CHAT -->
<div class="chat-btn" onclick="toggleChat()">💬</div>

<div class="chat-box" id="chatBox">
<div class="chat-header">AI Assistant</div>
<div class="chat-messages" id="chatMessages"></div>
<div class="chat-input">
<input id="userInput" placeholder="Type here...">
<button onclick="send()">Send</button>
</div>
</div>

<script>

let products={
"db boost":510,
"db life":544,
"db pan":220,
"dbx sun":450
};

function toggleChat(){
let box=document.getElementById("chatBox");
box.style.display = box.style.display==="flex"?"none":"flex";
if(chatMessages.innerHTML===""){
bot("Namaste 🙏 aapko kya problem hai?");
}
}

function bot(t){
chatMessages.innerHTML+=`<div class="msg bot">${t}</div>`;
scroll();
}

function user(t){
chatMessages.innerHTML+=`<div class="msg user">${t}</div>`;
scroll();
}

function scroll(){
chatMessages.scrollTop=chatMessages.scrollHeight;
}

function send(){
let input=document.getElementById("userInput");
let text=input.value.toLowerCase();
if(!text)return;
user(input.value);
input.value="";
reply(text);
}

function reply(t){

// PRICE CHECK
for(let p in products){
if(t.includes(p)){
bot(p.toUpperCase()+" ka price ₹"+products[p]+" hai. Kitne piece chahiye?");
return;
}
}

// DOCTOR
if(t.includes("doctor")){
bot("Free consultation ke liye apna number batayein.");
return;
}

// PROBLEM
if(t.includes("sugar")||t.includes("weakness")){
bot("Aapko kitne saal se sugar hai?");
return;
}

// ORDER
if(t.includes("order")){
window.open("https://wa.me/918434813523?text=Order");
return;
}

bot("Kripya apni problem ya product ka naam batayein.");

}

</script>

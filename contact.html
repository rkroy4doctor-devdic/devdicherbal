<style>
body{margin:0;font-family:Arial;background:#f5f5f5}

/* TOP */
.topbar{
background:#0f766e;
color:#fff;
padding:8px 15px;
display:flex;
justify-content:space-between;

}

/* NAVBAR */
.navbar{

.company{font-weight:bold;color:#065f46;font-size:14px}

/* NAV LINKS */
.nav-links{
display:flex;
gap:20px
}

.nav-links a{
text-decoration:none;
color:#333;
font-weight:600
}

/* ✅ ACTIVE LINK */
.nav-links a.active{
color:#059669;
}

/* HOVER */
.nav-links a:hover{
color:#059669
}

/* HAMBURGER */
.menu-toggle{
display:none;

}

/* MOBILE */

.menu-toggle{display:block}

.nav-links{

padding:10px;

}

.nav-links a{
padding:12px;
border-bottom:1px solid #eee;
}

.nav-links.active{
display:flex;
}

.company{font-size:12px}

}

/* CONTENT */
.section{
padding:40px 20px;
text-align:center
}

.box{
background:#fff;
padding:25px;
border-radius:10px;
box-shadow:0 5px 15px rgba(0,0,0,.1);
max-width:500px;
margin:auto;
}

.btn{
display:inline-block;
margin-top:15px;
padding:12px 20px;
background:#25D366;
color:white;
border-radius:8px;
text-decoration:none;
font-weight:bold;
}
</style>
</head>

<body>

</div>

<!-- SCRIPT -->
<script>

// TOGGLE MENU
function toggleMenu(){
document.getElementById("navLinks").classList.toggle("active");
}

// AUTO ACTIVE + AUTO CLOSE
let currentPage = window.location.pathname.split("/").pop();

document.querySelectorAll("#navLinks a").forEach(link=>{
let linkPage = link.getAttribute("href");

if(linkPage === currentPage){
link.classList.add("active");
}

link.addEventListener("click",()=>{
document.getElementById("navLinks").classList.remove("active");
});
});

</script>

</body>
